<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Events | Premium Experiences</title>
    <meta name="description" content="Book tickets for the most exclusive conferences, festivals, workshops, and exhibitions worldwide. Discover extraordinary experiences on Nexus Events.">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="bg-glow"></div>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo">⚡ Nexus Events</a>
        <div class="nav-center" id="nav-center">
            <nav>
                <a href="index.html" class="active">Catalog</a>
                <a href="dashboard.html">My Tickets</a>
            </nav>
        </div>
        <div class="nav-right" id="nav-right"></div>
    </header>

    <!-- MAIN -->
    <main>
        <!-- Hero -->
        <section class="hero">
            <p style="font-size:0.8rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--primary-light); margin-bottom:0.75rem;">
                Premium Event Experiences
            </p>
            <h1>Discover Extraordinary<br>Events Worldwide</h1>
            <p class="hero-subtitle">
                Secure your spot at the most anticipated conferences, festivals, workshops and exhibitions around the globe.
            </p>
            <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
                <a href="#catalog" class="btn btn-primary btn-lg">Browse Events</a>
                <button class="btn btn-secondary btn-lg" onclick="openAuthModal('register')" id="hero-register-btn">Create Account</button>
            </div>
            <div class="hero-stats">
                <div>
                    <div class="hero-stat-value">6+</div>
                    <div class="hero-stat-label">Events</div>
                </div>
                <div>
                    <div class="hero-stat-value">4</div>
                    <div class="hero-stat-label">Categories</div>
                </div>
                <div>
                    <div class="hero-stat-value">100%</div>
                    <div class="hero-stat-label">Secure</div>
                </div>
            </div>
        </section>

        <!-- Catalog -->
        <section id="catalog">
            <div class="search-filter-bar">
                <div class="search-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input
                        type="search"
                        id="catalog-search"
                        class="search-input"
                        placeholder="Search events, locations..."
                        autocomplete="off"
                    >
                </div>
                <div class="filter-tabs" id="filter-tabs">
                    <!-- Injected by app.js -->
                    <button class="filter-tab active" data-category="all">All</button>
                </div>
            </div>

            <div class="results-count" id="results-count"></div>

            <div class="events-grid" id="events-container">
                <!-- Injected by app.js -->
            </div>
        </section>
    </main>

    <!-- AUTH MODAL (Login + Register tabs) -->
    <div class="modal-overlay" id="auth-modal" role="dialog" aria-modal="true" aria-label="Authentication">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAuthModal()" aria-label="Close">&times;</button>

            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="login" onclick="switchAuthTab('login')">Log In</button>
                <button class="modal-tab" data-tab="register" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form-panel" data-panel="login">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-pass">Password</label>
                        <input type="password" id="login-pass" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                        <span class="btn-text">Log In</span>
                        <div class="loader btn-loader" style="display:none;"></div>
                    </button>
                </form>
                <p style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:var(--text-muted);">
                    Demo: <code style="color:var(--primary-light)">admin@nexus.com</code> / <code style="color:var(--primary-light)">password123</code>
                </p>
            </div>

            <!-- Register Form -->
            <div class="auth-form-panel" data-panel="register" style="display:none;">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" class="form-input" placeholder="Jane Smith" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-pass">Password</label>
                        <input type="password" id="reg-pass" class="form-input" placeholder="Min. 6 characters" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                        <span class="btn-text">Create Account</span>
                        <div class="loader btn-loader" style="display:none;"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="scripts/data.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
