<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | Nexus Events</title>
    <meta name="description" content="View event details and book your tickets on Nexus Events.">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="bg-glow"></div>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="logo">⚡ Nexus Events</a>
        <div class="nav-center">
            <nav>
                <a href="index.html">Catalog</a>
                <a href="dashboard.html">My Tickets</a>
            </nav>
        </div>
        <div class="nav-right" id="nav-right"></div>
    </header>

    <!-- MAIN -->
    <main>
        <div id="event-detail-wrapper">
            <!-- Injected by checkout.js -->
        </div>
    </main>

    <!-- AUTH MODAL (for unauthenticated users clicking "Log In to Book") -->
    <div class="modal-overlay" id="auth-modal" role="dialog" aria-modal="true" aria-label="Authentication">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAuthModal()" aria-label="Close">&times;</button>

            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="login" onclick="switchAuthTab('login')">Log In</button>
                <button class="modal-tab" data-tab="register" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form-panel" data-panel="login">
                <form onsubmit="handleLoginAndRefresh(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-pass">Password</label>
                        <input type="password" id="login-pass" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                        <span class="btn-text">Log In</span>
                        <div class="loader btn-loader" style="display:none;"></div>
                    </button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="auth-form-panel" data-panel="register" style="display:none;">
                <form onsubmit="handleRegisterAndRefresh(event)">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" class="form-input" placeholder="Jane Smith" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-pass">Password</label>
                        <input type="password" id="reg-pass" class="form-input" placeholder="Min. 6 characters" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                        <span class="btn-text">Create Account</span>
                        <div class="loader btn-loader" style="display:none;"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="scripts/data.js"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/checkout.js"></script>
    <script>
        // After logging in from event page, re-render the booking panel
        async function handleLoginAndRefresh(e) {
            e.preventDefault();
            const btn   = e.target.querySelector('button[type="submit"]');
            const email = document.getElementById('login-email').value.trim();
            const pass  = document.getElementById('login-pass').value;
            setButtonLoading(btn, true);
            const res = await loginUser(email, pass);
            setButtonLoading(btn, false);
            if (res.success) {
                closeAuthModal();
                toast(`Welcome back, ${res.user?.name || 'User'}!`, 'success');
                renderNav();
                // Re-render detail so the booking button appears
                const params = new URLSearchParams(window.location.search);
                await renderEventDetail(params.get('id'));
            } else {
                toast(res.error, 'error');
            }
        }

        async function handleRegisterAndRefresh(e) {
            e.preventDefault();
            const btn  = e.target.querySelector('button[type="submit"]');
            const name  = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass  = document.getElementById('reg-pass').value;
            setButtonLoading(btn, true);
            const res = await registerUser(name, email, pass);
            if (res.success) {
                const lr = await loginUser(email, pass);
                setButtonLoading(btn, false);
                if (lr.success) {
                    closeAuthModal();
                    toast(`Welcome, ${name}!`, 'success');
                    renderNav();
                    const params = new URLSearchParams(window.location.search);
                    await renderEventDetail(params.get('id'));
                }
            } else {
                setButtonLoading(btn, false);
                toast(res.error, 'error');
            }
        }

        // Close modal on overlay click
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('auth-modal');
            if (modal && e.target === modal) closeAuthModal();
        });
    </script>
</body>
</html>
